<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PDF Tools{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="header-row">
        <div class="logo">
          <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
            <rect width="36" height="36" rx="8" fill="#6366f1"/>
            <path d="M10 8h11l7 7v13a2 2 0 01-2 2H10a2 2 0 01-2-2V10a2 2 0 012-2z" fill="white" opacity=".9"/>
            <path d="M21 8l7 7h-5a2 2 0 01-2-2V8z" fill="white" opacity=".5"/>
            <rect x="13" y="17" width="10" height="1.5" rx=".75" fill="#6366f1"/>
            <rect x="13" y="20" width="7" height="1.5" rx=".75" fill="#6366f1"/>
            <rect x="13" y="23" width="8" height="1.5" rx=".75" fill="#6366f1"/>
          </svg>
          <span>PDF Tools</span>
        </div>
      </div>
      <nav class="nav-tabs">
        <a href="/" class="nav-tab {{ 'active' if active_page == 'converter' else '' }}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
          </svg>
          PDF Converter
        </a>
        <a href="/protect" class="nav-tab {{ 'active' if active_page == 'protect' else '' }}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
          </svg>
          Protect PDF
        </a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>
  {% block extra %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
