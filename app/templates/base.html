<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PDFriend{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="header-row">
        <a href="/" class="logo">
          <svg width="36" height="36" viewBox="0 0 38 38" fill="none">
            <rect width="38" height="38" rx="11" fill="#FF5757"/>
            <ellipse cx="19" cy="14" rx="11" ry="10" fill="#FFE4C8"/>
            <circle cx="15" cy="13" r="2.8" fill="#1A1A2E"/>
            <circle cx="23" cy="13" r="2.8" fill="#1A1A2E"/>
            <circle cx="16" cy="11.5" r="1.1" fill="white"/>
            <circle cx="24" cy="11.5" r="1.1" fill="white"/>
            <ellipse cx="11.5" cy="17" rx="3" ry="2" fill="#FFB8B8" opacity="0.85"/>
            <ellipse cx="26.5" cy="17" rx="3" ry="2" fill="#FFB8B8" opacity="0.85"/>
            <path d="M 15 19.5 Q 19 23.5 23 19.5" stroke="#1A1A2E" stroke-width="1.7" fill="none" stroke-linecap="round"/>
            <rect x="10" y="23" width="18" height="11" rx="3.5" fill="white" opacity="0.92"/>
            <rect x="12.5" y="26" width="7" height="1.6" rx="0.8" fill="#FF5757"/>
            <rect x="12.5" y="29" width="11" height="1.6" rx="0.8" fill="#FF5757" opacity="0.55"/>
          </svg>
          <span>PDFriend</span>
        </a>
      </div>
      <nav class="nav-tabs">
        <a href="/pdf-tools/convert" class="nav-tab {{ 'active' if active_page == 'converter' else '' }}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
          </svg>
          PDF Converter
        </a>
        <a href="/pdf-tools/protect" class="nav-tab {{ 'active' if active_page == 'protect' else '' }}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
          </svg>
          Protect PDF
        </a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>
  {% block extra %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
